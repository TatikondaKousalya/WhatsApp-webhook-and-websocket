# DATABASE
spring.datasource.url=jdbc:mysql://localhost:3306/whatsapp_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# FILE UPLOAD
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

application.file.upload-dir=uploads
app.upload.path=uploads/

# JWT SECURITY
application.security.jwt.secret-key=22ZqAyw+GCnUU/j5b5O+EYiFpLZ8nDHleFbjhBw8Fi6mkw120DHImHmYL7/c8yTkOMy7/0NL5caHzsU4V39vbg==

# 1 day milliseconds
application.security.jwt.expiration=86400000

# 2 days seconds
jwt.refresh-token-expiration=172800

# LOGGING
logging.level.root=INFO
logging.level.com.chatapp=DEBUG

# SERVER
server.port=8080